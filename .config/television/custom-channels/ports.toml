[metadata]
name = "ports"
description = "List/manage listening ports (TCP/UDP) — lsof"
requirements = ["lsof"]

[source]
command = '''lsof -i -P -n 2>/dev/null \
  | awk 'NR>1 && !seen[$9]++ {
      if ($8 == "TCP" && $10 == "(LISTEN)") {
        n=split($9,a,":"); port=a[n]; gsub(/[^0-9]/,"",port)
        if (port != 0) printf "%s\t%s\t%s\t%s\t%s\t%s\n", port, $1, $2, $3, "TCP", $9
      }
      if ($8 == "UDP" && $9 != "*:*") {
        n=split($9,a,":"); port=a[n]; gsub(/[^0-9]/,"",port)
        if (port != 0) printf "%s\t%s\t%s\t%s\t%s\t%s\n", port, $1, $2, $3, "UDP", $9
      }
    }' \
  | sort -t$'\t' -k1,1n'''
frecency = false
display = ":{split:\\t:0}  {split:\\t:1}  (PID {split:\\t:2}, {split:\\t:3})  [{split:\\t:4}]"
output = "{split:\\t:0}"

[keybindings]
enter = "actions:copy"
ctrl-d = ["actions:kill", "reload_source"]
ctrl-o = ["actions:open"]

[actions.copy]
description = "Copy port number to clipboard"
command = "printf '%s' '{split:\\t:0}' | pbcopy"
mode = "execute"

[actions.kill]
description = "Kill -9 process on port"
command = "kill -9 {split:\\t:2}"
mode = "fork"

[actions.open]
description = "Open http://localhost:{port} in browser"
command = "open http://localhost:{split:\\t:0}"
mode = "fork"
